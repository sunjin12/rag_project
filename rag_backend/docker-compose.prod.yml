# docker-compose.prod.yml — 프로덕션 배포용
#
# 사용법:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# 개발용 docker-compose.yml과의 차이점:
#   - FastAPI 백엔드가 컨테이너로 실행됨
#   - Nginx 리버스 프록시 포함 (SSL/TLS 지원)
#   - 서비스 간 내부 네트워크 사용 (외부 포트 최소화)
#   - 헬스체크 의존성 설정

services:
  # ─── Ollama (LLM 추론 엔진) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

  # ─── Qdrant (벡터 데이터베이스) ────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

  # ─── PostgreSQL (관계형 데이터베이스) ──────────────────
  postgres:
    image: postgres:15-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rag_history}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-rag_history}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ─── Redis (캐시) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ─── FastAPI 백엔드 ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_fastapi
    working_dir: /app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    env_file:
      - .env.prod
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rag_history}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
      - frontend

  # ─── Nginx 리버스 프록시 ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rag_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

volumes:
  ollama_data:
  qdrant_data:
  postgres_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
